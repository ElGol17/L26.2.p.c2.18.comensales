<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Comensales</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div id="app-bootstrap" class="container mt-3">
        <h1 class="text-center">Restaurante</h1>
        <hr>
        <button class="btn btn-success" id="body_btAgregarComensal">Agregar Comensal</button>
        <br><br>
        <div class="alert alert-info" text-start>
            <h3 class="text-black text-decoration-underline" ><strong>Reporte:</strong></h3>
            <p><strong>Total de costos:</strong> <span id="body_lblTotalCostos">0</span>$</p>
            <p><strong>Total de desayuno:</strong> <span id="body_lblTotalDesayuno">0</span>$</p>
            <p><strong>Total de almuerzo:</strong> <span id="body_lblTotalAlmuerzo">0</span>$</p>
            <p><strong>Total de ambos:</strong> <span id="body_lblTotalAmbos">0</span>$</p>
            <p><strong>Porcentaje de desayuno:</strong> <span id="body_lblPrctDesayuno">0</span>%</p>
            <p><strong>Porcentaje de almuerzo:</strong> <span id="body_lblPrctAlmuerzo">0</span>%</p>
            <p><strong>Porcentaje de ambos:</strong> <span id="body_lblPrctAmbos">0</span>%</p>
            <p><strong>Porcentaje con descuento:</strong> <span id="body_lblPrctDescuento">0</span>%</p>
            <p><strong>Porcentaje sin descuento:</strong> <span id="body_lblPrctSinDescuento">0</span>%</p></p>
        </div>
    </div>
    <div>
        <div class="modal fade" id="comensal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" text-start>Agregar Comensal</h5>
                    </div>
                    <div class="modal-body">
                        <label class="form-label">Nombre:</label>
                        <input type="text" class="form-control" id="comensal_inNombre">
                        <label class="form-label">Apellido:</label>
                        <input type="text" class="form-control" id="comensal_inApellido">
                        <label class="form-label">Cédula:</label>
                        <input type="text" class="form-control" id="comensal_inCedula">
                        <label class="form-label">Sexo:</label>
                        <select class="form-select" id="comensal_inSexo">
                            <option value="" disabled selected>Selecciona una opción.</option>
                            <option value="M">Masculino</option>
                            <option value="F">Femenino</option>
                        </select>
                        <label class="form-label">Fecha de Nacimiento:</label>
                        <input type="date" class="form-control" id="comensal_inFechaNacimiento">
                        <label class="form-label">Turno de Comida:</label>
                        <select class="form-select" id="comensal_inTurnoComida">
                            <option value="" disabled selected>Selecciona una opción.</option>
                            <option value="1">Desayuno</option>
                            <option value="2">Almuerzo</option>
                            <option value="3">Ambos</option>
                        </select>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-success" id="comensal_btAceptar">Guardar</button>
                        <button class="btn btn-secondary" id="comensal_btCancelar">Cancelar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import Cl_cComensal from "./dist/controllers/Cl_cComensal.js";
        import Cl_cRestaurante from "./dist/controllers/Cl_cRestaurante.js";

        import Cl_vComensalBootstrap from "./dist/views/Cl_vComensalBootstrap.js";
        import Cl_vRestauranteBootstrap from "./dist/views/Cl_vRestauranteBootstrap.js";

        const vistaRestaurante = new Cl_vRestauranteBootstrap();
        const vistaComensal = new Cl_vComensalBootstrap();

        const controladorComensal = new Cl_cComensal(vistaComensal);
        new Cl_cRestaurante(vistaRestaurante, controladorComensal);
    </script>
    </div>
</body>
</html>
